<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA OTP Manager - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e4e4e7;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    p {
      color: #71717a;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    input::placeholder {
      color: #52525b;
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background: linear-gradient(135deg, #16a34a, #15803d);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      color: #ef4444;
      font-size: 0.8125rem;
      margin-top: 0.75rem;
      text-align: center;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: #52525b;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">📱</div>
      <h1>WA OTP Manager</h1>
      <p>Login untuk melanjutkan</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <button type="submit" class="btn-login" id="btnLogin">
        Login
      </button>
    </form>

    <div class="footer">
      Default: admin / admin123
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const btnLogin = document.getElementById('btnLogin');

    // Check if already logged in
    const token = localStorage.getItem('wa_otp_token');
    if (token) {
      window.location.href = '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      btnLogin.disabled = true;
      btnLogin.textContent = 'Loading...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login gagal');
        }

        localStorage.setItem('wa_otp_token', data.token);
        localStorage.setItem('wa_otp_user', data.username);
        window.location.href = '/';

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Login';
      }
    });

    // Enter key on password field
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
